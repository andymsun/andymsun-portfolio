<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andy Sun</title>
  <meta name="description" content="Andy Sun — ssh ssh.andymsun.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <main>
    <div class="terminal-card">
      <div class="terminal-dots">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
      </div>
      <div class="terminal-body">
        <div class="prompt-line">
          <span class="prompt-symbol">$</span>
          <code id="ssh-command">ssh ssh.andymsun.com</code>
        </div>
        <button id="copy-btn" class="copy-btn" aria-label="Copy SSH command">
          <svg class="icon-copy" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <svg class="icon-check" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <span class="copy-text">copy</span>
        </button>
      </div>

    </div>
  </main>

  <script>
    const btn = document.getElementById('copy-btn');
    const command = document.getElementById('ssh-command').textContent;

    btn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(command);
        btn.classList.add('copied');
        btn.querySelector('.copy-text').textContent = 'copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.querySelector('.copy-text').textContent = 'copy';
        }, 2000);
      } catch {
        // Fallback for older browsers
        const ta = document.createElement('textarea');
        ta.value = command;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.classList.add('copied');
        btn.querySelector('.copy-text').textContent = 'copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.querySelector('.copy-text').textContent = 'copy';
        }, 2000);
      }
    });
  </script>
</body>
</html>
